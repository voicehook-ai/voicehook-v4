name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (dev)
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest
        run: pytest -q
